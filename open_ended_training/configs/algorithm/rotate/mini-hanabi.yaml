defaults:
  - rotate/_base_
  - _self_ # values from this file override the values from the base file

USE_MLP: true # use MLP policies instead of S5 (belief model provides memory)
FC_HIDDEN_DIM: 256
ACTIVATION: 'relu'

TIMESTEPS_PER_ITER_PARTNER: 5e7
TIMESTEPS_PER_ITER_EGO: 2e6
NUM_OPEN_ENDED_ITERS: 20
REGRET_SP_WEIGHT: 2.0
LR: 1e-4
CLIP_EPS: 0.1
ENT_COEF: 0.01
ANNEAL_LR: true
EGO_ARGS:
  LR: 5e-5
  ENT_COEF: 1e-4
  CLIP_EPS: 0.1
  ANNEAL_LR: false
  UPDATE_EPOCHS: 10
  S5_ACTOR_CRITIC_HIDDEN_DIM: 256
  FC_N_LAYERS: 3
PRETRAIN_ARGS:
  TOTAL_TIMESTEPS: 1e6
  NUM_AGENTS: 3
  NUM_CHECKPOINTS: 2